{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="EscTrix is a futuristic digital agency providing advanced software development, web application development, premium UI/UX designs, and stunning animations.">
    <meta name="keywords" content="Software Development, Web Development, UI/UX Design, Motion Graphics, Animations, Startup, EscTrix">
    <meta name="author" content="EscTrix">
    <title>{% block title %}EscTrix | The Future of Digital Innovation{% endblock %}</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="{% static 'images/logo.png' %}">

    <!-- CSS Stylesheets -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/animations.css' %}">

    {% block extra_head %}{% endblock %}
</head>
<body>
    <!-- Loader Screen -->
    <div id="loader-screen">
        <div class="loader-logo-wrapper">
            <div class="loader-ring"></div>
            <img src="{% static 'images/logo.png' %}" alt="EscTrix Logo" class="loader-logo">
        </div>
        <div class="loader-text">ESCTRIX</div>
    </div>

    <!-- Background Space Elements -->
    <div class="grid-bg"></div>
    <div class="radial-glow"></div>
    <div class="radial-glow-2"></div>

    <!-- Header Navigation -->
    {% include 'components/navbar.html' %}

    <!-- Page Main Content -->
    <main>
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include 'components/footer.html' %}

    <!-- Back to Top Button -->
    <button class="back-to-top" aria-label="Back to Top">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg>
    </button>

    <!-- Scripts -->
    <script src="{% static 'js/particles.js' %}"></script>
    <script src="{% static 'js/main.js' %}"></script>
    <script src="{% static 'js/form.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
