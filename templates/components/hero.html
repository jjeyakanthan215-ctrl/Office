{% load static %}
<section id="hero" class="hero-section">
    <canvas id="particles-canvas"></canvas>
    
    <div class="hero-container">
        <div class="hero-content reveal-left">
            <div class="badge-futuristic">
                <span class="badge-dot"></span>
                <span>SYSTEM ACTIVE • EST. 2026</span>
            </div>
            
            <h1 class="hero-title">
                Building the Future of <br>
                <span class="glow-text">Digital Products</span>
            </h1>
            
            <div class="hero-tagline">
                We craft state-of-the-art <span id="typing-text" style="color: var(--cyan); font-weight: bold; border-right: 2px solid var(--cyan); padding-right: 5px;"></span>.
            </div>
            
            <div class="hero-actions">
                <a href="#projects" class="btn-primary">
                    EXPLORE WORK
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                </a>
                <a href="#contact" class="btn-secondary">DISCUSS PROJECT</a>
            </div>
        </div>
        
        <div class="hero-visual reveal-right delay-200">
            <div class="hero-shield-wrapper">
                <div class="shield-ring-1"></div>
                <div class="shield-ring-2"></div>
                <img src="{% static 'images/logo.png' %}" alt="EscTrix Shield Logo" class="hero-shield-img">
            </div>
        </div>
    </div>
</section>
